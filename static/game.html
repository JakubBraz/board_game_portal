<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game — Board Games Portal</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="game-body">
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:0.5rem">
          <span class="logo-icon">♟</span>
          <span class="logo-text">BoardPortal</span>
        </a>
      </div>
      <div class="game-header-info">
        <span id="gameTypeBadge" class="badge badge-game">Chess</span>
        <span id="roomIdBadge" class="badge badge-room">Room: —</span>
      </div>
      <nav class="nav">
        <a href="/lobby.html" class="nav-link">← Lobby</a>
      </nav>
    </div>
  </header>

  <main class="game-main">
    <!-- Waiting screen -->
    <div id="waitingScreen" class="waiting-screen">
      <div class="waiting-card">
        <div class="spinner"></div>
        <h2>Waiting for opponent…</h2>
        <p>Share this link to invite a friend:</p>
        <div class="share-link">
          <input type="text" id="shareLink" readonly />
          <button class="btn btn-secondary" id="copyLinkBtn">Copy</button>
        </div>
        <p class="waiting-hint">You are playing as <strong id="yourColorWait"></strong></p>
      </div>
    </div>

    <!-- Game screen -->
    <div id="gameScreen" class="game-screen hidden">
      <div class="game-layout">
        <!-- Left panel: player info + moves -->
        <div class="side-panel side-panel-left">
          <div class="player-card opponent-card" id="opponentCard">
            <div class="player-avatar" id="opponentAvatar">?</div>
            <div class="player-info">
              <span class="player-label">Opponent</span>
              <span class="player-color-badge" id="opponentColor">—</span>
            </div>
            <div class="player-timer" id="opponentTimer"></div>
          </div>

          <div class="captured-display" id="capturedByOpponent"></div>

          <div id="boardWrapper" class="board-wrapper">
            <canvas id="gameCanvas"></canvas>
          </div>

          <div class="captured-display" id="capturedByYou"></div>

          <div class="player-card your-card" id="yourCard">
            <div class="player-avatar" id="yourAvatar">Y</div>
            <div class="player-info">
              <span class="player-label">You</span>
              <span class="player-color-badge" id="yourColor">—</span>
            </div>
          </div>
        </div>

        <!-- Right panel: status + controls + chat -->
        <div class="side-panel side-panel-right">

          <!-- Game result card — shown in-panel so the board stays visible -->
          <div id="gameOverPanel" class="game-over-panel hidden">
            <div class="game-over-panel-top">
              <span class="game-over-panel-icon" id="gameOverIcon">🏆</span>
              <div>
                <div class="game-over-panel-title" id="gameOverTitle">Game Over</div>
                <div class="game-over-panel-msg" id="gameOverMessage"></div>
              </div>
            </div>
            <div class="game-over-panel-actions">
              <a href="/lobby.html" class="btn btn-primary btn-sm">New Game</a>
              <a href="/" class="btn btn-secondary btn-sm">Home</a>
            </div>
          </div>

          <div class="game-status-panel" id="statusPanel">
            <div class="status-indicator" id="statusIndicator">
              <span class="status-dot"></span>
              <span id="statusText">Waiting…</span>
            </div>
          </div>

          <!-- Go-specific: pass & score info -->
          <div id="goControls" class="go-controls hidden">
            <button class="btn btn-secondary btn-sm" id="passBtn">Pass</button>
            <div class="score-display">
              <div>Black captures: <strong id="blackCaptures">0</strong></div>
              <div>White captures: <strong id="whiteCaptures">0</strong></div>
            </div>
          </div>

          <div class="promotion-dialog hidden" id="promotionDialog">
            <h4>Promote pawn to:</h4>
            <div class="promotion-options">
              <button class="promo-btn" data-piece="queen">♛ Queen</button>
              <button class="promo-btn" data-piece="rook">♜ Rook</button>
              <button class="promo-btn" data-piece="bishop">♝ Bishop</button>
              <button class="promo-btn" data-piece="knight">♞ Knight</button>
            </div>
          </div>

          <div class="move-history" id="moveHistory">
            <h4>Move History</h4>
            <div class="moves-list" id="movesList"></div>
          </div>

          <div class="game-actions">
            <button class="btn btn-danger btn-sm" id="resignBtn">Resign</button>
            <button class="btn btn-secondary btn-sm" id="copyGameLinkBtn">Copy Link</button>
          </div>

          <div class="chat-panel">
            <h4>Chat</h4>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
              <input type="text" id="chatInput" placeholder="Say something…" maxlength="200" />
              <button class="btn btn-secondary btn-sm" id="chatSendBtn">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="/js/games/chess.js"></script>
  <script src="/js/games/checkers.js"></script>
  <script src="/js/games/go.js"></script>
  <script src="/js/games/gomoku.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
